name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # `build` compiles + runs tests; `apiCheck` fails the build if the public ABI
      # drifts from result/api/result.api without an intentional apiDump.
      - name: Build, test, and verify public API
        run: ./gradlew build apiCheck --no-configuration-cache --stacktrace
